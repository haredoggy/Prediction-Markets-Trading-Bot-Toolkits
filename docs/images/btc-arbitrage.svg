<svg width="880" height="420" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','Fira Code','Consolas',monospace">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="winGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.02"/>
    </linearGradient>
    <clipPath id="chartClip1">
      <rect x="60" y="70" width="780" height="250"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="880" height="420" fill="#0d1117" rx="10"/>

  <!-- Header -->
  <rect width="880" height="52" fill="#161b22" rx="10"/>
  <rect y="42" width="880" height="10" fill="#161b22"/>
  <rect y="51" width="880" height="1" fill="#30363d"/>

  <!-- Window chrome -->
  <circle cx="28" cy="26" r="6" fill="#f85149" opacity="0.9"/>
  <circle cx="48" cy="26" r="6" fill="#d29922" opacity="0.9"/>
  <circle cx="68" cy="26" r="6" fill="#3fb950" opacity="0.9"/>

  <!-- Title -->
  <text x="92" y="20" fill="#8b949e" font-size="11">strategy 1</text>
  <text x="92" y="36" fill="#e6edf3" font-size="14" font-weight="bold">BTC 5‑min / 15‑min / 1hr Arbitrage Bot</text>

  <!-- Window badges -->
  <rect x="508" y="14" width="42" height="22" rx="4" fill="#1c2a3a"/>
  <text x="520" y="29" fill="#58a6ff" font-size="11" font-weight="bold">5m</text>
  <rect x="558" y="14" width="48" height="22" rx="4" fill="#1c2a3a"/>
  <text x="570" y="29" fill="#58a6ff" font-size="11" font-weight="bold">15m</text>
  <rect x="614" y="14" width="44" height="22" rx="4" fill="#21262d"/>
  <text x="626" y="29" fill="#8b949e" font-size="11">1hr</text>

  <!-- LIVE badge -->
  <rect x="776" y="14" width="52" height="22" rx="4" fill="#1a2f1a"/>
  <circle cx="789" cy="25" r="3.5" fill="#3fb950"/>
  <text x="797" y="29" fill="#3fb950" font-size="10" font-weight="bold">LIVE</text>

  <!-- Grid lines -->
  <line x1="60" y1="95"  x2="820" y2="95"  stroke="#21262d" stroke-width="1"/>
  <line x1="60" y1="140" x2="820" y2="140" stroke="#21262d" stroke-width="1"/>
  <line x1="60" y1="185" x2="820" y2="185" stroke="#21262d" stroke-width="1"/>
  <line x1="60" y1="230" x2="820" y2="230" stroke="#21262d" stroke-width="1"/>
  <line x1="60" y1="275" x2="820" y2="275" stroke="#21262d" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="12" y="99"  fill="#8b949e" font-size="9">48.4k</text>
  <text x="12" y="144" fill="#8b949e" font-size="9">47.9k</text>
  <text x="12" y="189" fill="#8b949e" font-size="9">47.4k</text>
  <text x="12" y="234" fill="#8b949e" font-size="9">46.9k</text>
  <text x="12" y="279" fill="#8b949e" font-size="9">46.4k</text>

  <!-- Price area fill -->
