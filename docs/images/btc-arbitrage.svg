  <text x="110" y="340" fill="#8b949e" font-size="9" text-anchor="middle">09:50</text>
  <text x="260" y="340" fill="#8b949e" font-size="9" text-anchor="middle">09:55</text>
  <text x="410" y="340" fill="#8b949e" font-size="9" text-anchor="middle">10:00</text>
  <text x="535" y="348" fill="#58a6ff" font-size="9" text-anchor="middle">10:05</text>
  <text x="710" y="340" fill="#8b949e" font-size="9" text-anchor="middle">10:10</text>
  <text x="810" y="340" fill="#8b949e" font-size="9" text-anchor="middle">10:12</text>

  <!-- Bottom stats bar -->
  <rect y="357" width="880" height="63" fill="#161b22" rx="0"/>
  <rect y="363" width="880" height="1" fill="#30363d"/>

  <text x="36" y="378" fill="#8b949e" font-size="9">EXEC LATENCY</text>
  <text x="36" y="398" fill="#58a6ff" font-size="16" font-weight="bold">~42ms</text>

  <line x1="160" y1="365" x2="160" y2="412" stroke="#30363d" stroke-width="1"/>
  <text x="176" y="378" fill="#8b949e" font-size="9">TIME WINDOWS</text>
  <text x="176" y="398" fill="#e6edf3" font-size="15" font-weight="bold">5m · 15m · 1hr</text>

  <line x1="360" y1="365" x2="360" y2="412" stroke="#30363d" stroke-width="1"/>
  <text x="376" y="378" fill="#8b949e" font-size="9">ORDER TYPES</text>
  <text x="376" y="398" fill="#e6edf3" font-size="15" font-weight="bold">FAK / GTD</text>

  <line x1="530" y1="365" x2="530" y2="412" stroke="#30363d" stroke-width="1"/>
  <text x="546" y="378" fill="#8b949e" font-size="9">MODES</text>
  <text x="546" y="398" fill="#3fb950" font-size="15" font-weight="bold">Dry Run ✓  Live ✓</text>

  <line x1="740" y1="365" x2="740" y2="412" stroke="#30363d" stroke-width="1"/>
  <text x="756" y="378" fill="#8b949e" font-size="9">ASSET</text>
  <text x="756" y="398" fill="#e6edf3" font-size="15" font-weight="bold">BTC</text>

  <!-- Watermark -->
  <text x="868" y="416" fill="#8b949e" font-size="9" opacity="0.45" text-anchor="end">@haredoggy</text>
</svg>
