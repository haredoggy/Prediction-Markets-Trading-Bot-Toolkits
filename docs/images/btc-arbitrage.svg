  <circle cx="510" cy="152" r="2.5" fill="#3fb950"/>
  <line x1="510" y1="144" x2="510" y2="110" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="468" y="92" width="100" height="22" rx="3" fill="#1a2f1a" stroke="#3fb950" stroke-width="0.5"/>
  <text x="476" y="107" fill="#3fb950" font-size="10" font-weight="bold">▲ ARBIT SIGNAL</text>

