  <line x1="490" y1="142" x2="490" y2="178" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="484" y="152" width="12" height="18" fill="#3fb950" rx="1"/>
  <!-- DOWN candle -->
  <line x1="520" y1="148" x2="520" y2="172" stroke="#f85149" stroke-width="1.5"/>
  <rect x="514" y="154" width="12" height="14" fill="#f85149" rx="1"/>
  <!-- UP candle -->
  <line x1="550" y1="138" x2="550" y2="168" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="544" y="148" width="12" height="14" fill="#3fb950" rx="1"/>
  <!-- DOWN candle -->
  <line x1="580" y1="144" x2="580" y2="178" stroke="#f85149" stroke-width="1.5"/>
  <rect x="574" y="155" width="12" height="16" fill="#f85149" rx="1"/>

  <!-- BUY signal annotation -->
